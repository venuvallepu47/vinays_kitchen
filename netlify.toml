[build]
  command = "npm run build"
  publish = "dist"

# index.html — never cache; always fetch fresh so new SW is discovered immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# Service worker scripts — must never be cached so browsers detect updates instantly
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Vite-hashed JS/CSS bundles — safe to cache forever (content-addressed)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Icons / images — long cache, content rarely changes
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
